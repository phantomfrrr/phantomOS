<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Resource Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 1. Education Layer (The Mask) -->
    <div id="edu-layer">
        <header><h1>Academic Portal</h1></header>
        <div class="content">
            <button class="edu-btn">History</button>
            <button class="edu-btn">Science</button>
            <button id="math-trigger" class="edu-btn">Math</button>
        </div>
    </div>

    <!-- 2. Boot Screen (The 3-Second Transition) -->
    <div id="boot-screen" class="hidden">
        <p>booting up <span style="color:#8e44ad; font-weight:bold;">phantomOS</span>...</p>
        <div class="progress-container">
            <div id="boot-progress"></div>
        </div>
    </div>

    <!-- 3. phantomOS Layer (The Real Site) -->
    <div id="os-layer" class="hidden">
        <canvas id="particles"></canvas>
        
        <div class="os-header">
            <div id="time">00:00</div>
            <div id="battery">🔋 --%</div>
        </div>

        <div class="os-main">
            <!-- Home Screen -->
            <div id="os-home">
                <h1 class="logo">phantom<span class="purple-box">OS</span></h1>
                <p class="subtitle">hello there!</p>
                <div class="box-container">
                    <button onclick="showCategory('simulations')">SIMULATIONS</button>
                    <button onclick="showCategory('apps')">APPS</button>
                </div>
            </div>

            <!-- Games Grid -->
            <div id="game-grid" class="hidden">
                <div class="grid-header">
                   <button class="back-btn" onclick="showHome()">← Back</button>
                </div>
                
                <div class="grid-container">
                    <!-- GAME 1: Alien Hominoid -->
                    <div class="game-card" onclick="launchGame('games/Alien Hominoid/index.html')">
                        <div class="game-icon">👽</div>
                        <p>Alien Hominoid</p>
                    </div>

                    <!-- GAME 2: Attack Hole -->
                    <div class="game-card" onclick="launchGame('games/Attack Hole/index.html')">
                        <div class="game-icon">🕳️</div>
                        <p>Attack Hole</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Fullscreen Game Viewer -->
        <div id="game-frame-container" class="hidden">
            <button class="close-game" onclick="closeGame()">Exit Game</button>
            <iframe id="game-iframe" src=""></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
